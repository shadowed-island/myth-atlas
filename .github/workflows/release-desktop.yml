name: Release Desktop

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type checks
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Ensure GitHub Release exists
        shell: bash
        run: |
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes ""
          fi

  package:
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            runner: macos-14
            command: pnpm desktop:dist:mac:arm64
          - label: windows-x64
            runner: windows-2022
            command: pnpm desktop:dist:win:x64

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            dist/desktop/*.zip
            dist/desktop/*.exe
            dist/desktop/*.dmg
            dist/desktop/*.blockmap
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find dist/desktop -maxdepth 1 -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.dmg' -o -name '*.blockmap' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found in dist/desktop" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
